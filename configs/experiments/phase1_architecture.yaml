experiment:
  name: "routing_phase1_architecture"
  checkpoint_root: "checkpoints/experiments"

  base_train_cfg: "configs/train.yaml"
  base_model_cfg: "configs/model.yaml"
  base_data_cfg: "configs/data.yaml"

  device: "auto"
  continue_on_error: true
  skip_existing: true
  seeds: [42, 3407, 2026]

  # Phase-1: first select large model structure by multi-station objective.
  losses:
    - name: "mean_kge"
      eps: 1.0e-6

  train_overrides:
    trainer:
      plot_train_curve: true
      post_train_simulate: true
      post_train_splits: ["calibrate", "verify"]
      post_train_plot: true

  model_overrides: {}

  # Fixed core hyperparameters for fair architecture screening.
  search:
    windowsize: [24]
    khop: [3]
    variants:
      - id: "gr2n_gcn_tail_slope"
        model:
          name: "gr2n"
          input_projector: "slope"
          spatial: "gcn"
          temporal: "tail_mean"

      - id: "gr2n_gcn_attn_slope"
        model:
          name: "gr2n"
          input_projector: "slope"
          spatial: "gcn"
          temporal: "attention"

      - id: "gr2n_gat_attn_slope"
        model:
          name: "gr2n"
          input_projector: "slope"
          spatial: "gat"
          temporal: "attention"

      - id: "gr2n_gat_attn_mlp"
        model:
          name: "gr2n"
          input_projector: "mlp"
          spatial: "gat"
          temporal: "attention"

      - id: "gr2n_seq2seq_gcn_attn_slope"
        model:
          name: "gr2n_seq2seq"
          input_projector: "slope"
          spatial: "gcn"
          temporal: "attention"

      - id: "gr2n_seq2seq_gat_attn_slope"
        model:
          name: "gr2n_seq2seq"
          input_projector: "slope"
          spatial: "gat"
          temporal: "attention"

  staged:
    enabled: true
    screen_seed: 42
    top_k_per_loss: 2
    ranking_metric: "verify_kge_denorm"

