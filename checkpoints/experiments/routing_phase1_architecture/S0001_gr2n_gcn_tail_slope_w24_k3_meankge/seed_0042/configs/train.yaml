seed: 42
device: auto
reproducibility:
  deterministic: false
  cudnn_benchmark: null
dataset:
  windowsize: 24
  input_freq_per_day: 1
  n_pred: 1
  khop: 3
  predict_current: 1
  self_loop: false
  dataset_type: train
  data_home: data/raw/case5
  data_cfg_path: configs/data.yaml
  model_cfg_path: configs/model.yaml
dataloader:
  train:
    batch_size: 8
    shuffle: true
    num_workers: 0
    pin_memory: false
    drop_last: false
    use_balance_sampler: false
  val:
    batch_size: 8
    shuffle: false
    num_workers: 0
    pin_memory: false
    drop_last: false
    use_balance_sampler: false
model: {}
loss:
  name: mean_kge
  eps: 1.0e-06
optimizer:
  name: adamw
  lr: 0.001
  weight_decay: 0.0001
  betas:
  - 0.9
  - 0.999
  eps: 1.0e-08
  momentum: 0.9
  nesterov: false
scheduler:
  name: plateau
  mode: max
  factor: 0.5
  patience: 3
  threshold: 0.0001
  min_lr: 1.0e-06
  step_size: 10
  gamma: 0.5
  t_max: 50
  max_lr: 0.001
  pct_start: 0.3
  div_factor: 25.0
  final_div_factor: 10000.0
trainer:
  epochs: 50
  use_amp: false
  amp_dtype: float16
  grad_clip_norm: 1.0
  log_interval: 50
  monitor: val_kge_denorm
  monitor_mode: max
  early_stopping_patience: 8
  checkpoint_dir: F:\research\Research\Routing\code\checkpoints\experiments\routing_phase1_architecture\S0001_gr2n_gcn_tail_slope_w24_k3_meankge\seed_0042
  keep_last_k: 3
  resume_path: null
  plot_train_curve: true
  plot_train_curve_file: objective_vs_epoch.png
  post_train_simulate: true
  post_train_splits:
  - calibrate
  - verify
  post_train_plot: true
  post_train_batch_size: 128
  post_train_save_dir: post_train_simulation
